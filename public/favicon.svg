<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Circle -->
  <circle cx="256" cy="260" r="160" fill="#f8b133" stroke="#231f20" stroke-width="12" />
  
  <!-- Wooden Board behind the monkey's neck -->
  <g transform="rotate(-6, 256, 175)">
    <rect x="60" y="130" width="392" height="76" rx="6" fill="#c78d4c" stroke="#231f20" stroke-width="12" />
    <!-- Wood grain details -->
    <path d="M 80 150 Q 150 145 220 160 T 380 155" fill="none" stroke="#965c24" stroke-width="4" stroke-linecap="round" />
    <path d="M 120 175 Q 240 185 360 170" fill="none" stroke="#965c24" stroke-width="3" stroke-linecap="round" />
    <!-- A knot in the wood -->
    <path d="M 390 165 C 410 155 410 185 390 175 C 380 170 380 160 390 165" fill="none" stroke="#965c24" stroke-width="4" stroke-linecap="round" />
    <path d="M 370 170 C 375 170 380 172 385 170" fill="none" stroke="#965c24" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Monkey Body / Torso -->
  <!-- Arm holding wood (left in image, right shoulder) -->
  <path d="M 130 330 C 130 300 170 230 200 230 C 210 230 220 250 215 270 L 195 330 Z" fill="#8d5b34" stroke="#231f20" stroke-width="12" stroke-linejoin="round" />

  <!-- Main Torso -->
  <path d="M 180 350 C 160 410 180 470 256 470 C 330 470 350 410 330 350 Z" fill="#8d5b34" stroke="#231f20" stroke-width="12" stroke-linejoin="round" />

  <!-- Overalls -->
  <path d="M 195 360 C 185 390 195 470 256 470 C 315 470 325 390 315 360 Z" fill="#2c5697" stroke="#231f20" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" />
  <!-- Overalls details: straps -->
  <path d="M 205 360 L 225 315 C 228 308 238 308 240 315 L 245 360" fill="none" stroke="#231f20" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 205 360 L 225 315 C 228 308 238 308 240 315 L 245 360" fill="#2c5697" stroke-dasharray="none" />
  
  <path d="M 305 360 L 285 315 C 282 308 272 308 270 315 L 265 360" fill="none" stroke="#231f20" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 305 360 L 285 315 C 282 308 272 308 270 315 L 265 360" fill="#2c5697" />

  <!-- Strap buttons -->
  <circle cx="232" cy="335" r="7" fill="#f8b133" stroke="#231f20" stroke-width="4" />
  <circle cx="278" cy="335" r="7" fill="#f8b133" stroke="#231f20" stroke-width="4" />

  <!-- Overalls Center Seam & Pocket -->
  <path d="M 235 390 H 277 V 430 Q 256 445 235 430 Z" fill="#244880" stroke="#231f20" stroke-width="8" stroke-linejoin="round" />

  <!-- Monkey Head -->
  <!-- Ears -->
  <!-- Left Ear -->
  <circle cx="150" cy="205" r="32" fill="#8d5b34" stroke="#231f20" stroke-width="12" />
  <path d="M 150 185 C 135 185 130 200 135 210 C 140 220 155 220 160 210" fill="#eed5b7" stroke="#231f20" stroke-width="8" />
  
  <!-- Right Ear -->
  <circle cx="362" cy="205" r="32" fill="#8d5b34" stroke="#231f20" stroke-width="12" />
  <path d="M 362 185 C 377 185 382 200 377 210 C 372 220 357 220 352 210" fill="#eed5b7" stroke="#231f20" stroke-width="8" />

  <!-- Head shape -->
  <path d="M 160 210 C 150 130 360 130 350 210 C 350 270 160 270 160 210 Z" fill="#8d5b34" stroke="#231f20" stroke-width="12" stroke-linejoin="round" />

  <!-- Face mask (cream area) -->
  <path d="M 175 215 
           C 170 180, 215 155, 256 185 
           C 297 155, 342 180, 337 215 
           C 330 265, 290 280, 256 280 
           C 222 280, 182 265, 175 215 Z" 
        fill="#eed5b7" stroke="#231f20" stroke-width="12" stroke-linejoin="round" />

  <!-- Eyes -->
  <!-- Left Eye -->
  <ellipse cx="230" cy="190" rx="14" ry="20" fill="#ffffff" stroke="#231f20" stroke-width="8" />
  <ellipse cx="233" cy="192" rx="7" ry="10" fill="#231f20" />
  <circle cx="231" cy="186" r="3" fill="#ffffff" />
  
  <!-- Right Eye -->
  <ellipse cx="282" cy="190" rx="14" ry="20" fill="#ffffff" stroke="#231f20" stroke-width="8" />
  <ellipse cx="279" cy="192" rx="7" ry="10" fill="#231f20" />
  <circle cx="277" cy="186" r="3" fill="#ffffff" />

  <!-- Muzzle/Nose area -->
  <path d="M 230 215 Q 256 205 282 215 Q 295 235 256 235 Q 217 235 230 215 Z" fill="#eed5b7" />
  <!-- Nose -->
  <path d="M 244 218 C 244 212, 268 212, 268 218 C 268 224, 244 224, 244 218 Z" fill="#231f20" />

  <!-- Mouth -->
  <path d="M 205 235 Q 256 265 307 235" fill="none" stroke="#231f20" stroke-width="10" stroke-linecap="round" />

  <!-- Cap -->
  <path d="M 180 150 C 180 100 332 100 332 150 Z" fill="#2c5697" stroke="#231f20" stroke-width="12" stroke-linejoin="round" />
  <!-- Cap visor -->
  <path d="M 160 148 C 200 135, 310 135, 350 148 L 332 165 C 290 155, 220 155, 180 165 Z" fill="#1b3a6b" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
  <!-- Cap button -->
  <ellipse cx="256" cy="100" rx="10" ry="7" fill="#2c5697" stroke="#231f20" stroke-width="8" />

  <!-- Right Hand holding the wood (on shoulder) -->
  <g transform="translate(345, 170)">
    <path d="M 0 0 C 15 -10, 25 15, 10 25 C 0 32, -10 15, -5 5" fill="#eed5b7" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
    <path d="M 12 5 C 27 -5, 37 20, 22 30 C 12 37, 2 20, 7 10" fill="#eed5b7" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
    <path d="M 24 12 C 39 2, 49 27, 34 37 C 24 44, 14 27, 19 17" fill="#eed5b7" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
    <path d="M 36 22 C 48 12, 58 37, 43 47 C 33 54, 26 37, 31 27" fill="#eed5b7" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
  </g>

  <!-- Left Arm holding the Hammer -->
  <path d="M 290 350 C 310 320 380 320 395 385 C 380 430 350 440 320 400" fill="#8d5b34" stroke="#231f20" stroke-width="12" stroke-linejoin="round" />

  <!-- Hand holding Hammer -->
  <circle cx="340" cy="400" r="24" fill="#eed5b7" stroke="#231f20" stroke-width="12" />
  <!-- Fingers on handle -->
  <path d="M 324 385 Q 315 390 320 400" stroke="#231f20" stroke-width="8" stroke-linecap="round" />
  <path d="M 328 395 Q 320 402 325 410" stroke="#231f20" stroke-width="8" stroke-linecap="round" />
  <path d="M 334 405 Q 326 412 331 420" stroke="#231f20" stroke-width="8" stroke-linecap="round" />

  <!-- Hammer -->
  <g transform="translate(340, 400) rotate(-25)">
    <!-- Hammer Handle -->
    <rect x="-10" y="-30" width="20" height="150" rx="8" fill="#c78d4c" stroke="#231f20" stroke-width="10" />
    <rect x="-10" y="60" width="20" height="60" rx="4" fill="#a06830" />
    <!-- Hammer Metal Head -->
    <g transform="translate(0, -35)">
      <!-- Claw part -->
      <path d="M -12 0 C -35 -5, -45 -30, -35 -40 C -25 -50, -10 -20, 0 -15" fill="#d1d5db" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
      <!-- Center head -->
      <rect x="-15" y="-20" width="30" height="25" fill="#d1d5db" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
      <!-- Striking face -->
      <path d="M 10 -25 L 30 -25 C 35 -25, 35 5, 30 5 L 10 5 Z" fill="#9ca3af" stroke="#231f20" stroke-width="10" stroke-linejoin="round" />
      <!-- Wedge detail -->
      <ellipse cx="0" cy="-20" rx="6" ry="3" fill="#374151" />
    </g>
  </g>
</svg>
